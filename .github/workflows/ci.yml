name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  go-test:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'src/failover/go.mod'
        cache-dependency-path: 'src/failover/go.sum'
    - name: Run Go tests
      working-directory: src/failover
      run: go test -v -cover ./...

  setup:
    name: Generate Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup Nix
      uses: ./.github/actions/setup-nix

    - name: Generate Matrix
      id: set-matrix
      run: |
        CHECKS=$(nix eval --json .#checks.x86_64-linux --apply builtins.attrNames)
        echo "matrix=$CHECKS" >> "$GITHUB_OUTPUT"

  check:
    needs: setup
    name: Check ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        check: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup Nix
      uses: ./.github/actions/setup-nix

    - name: Run check
      run: nix build -L .#checks.x86_64-linux.${{ matrix.check }}
